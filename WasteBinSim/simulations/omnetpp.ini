[General]
network = wastebinsim.simulations.WasteBinNetwork
sim-time-limit = 24h
simtime-resolution = -11

rng-class = "cMersenneTwister"
repeat = 10
seed-set = ${repetition}

**.vector-recording = true
**.scalar-recording = true

# -------------------------------------------------
# Reduce console output for command-line mode
# -------------------------------------------------

# Turn off most internal logs in Cmdenv
**.cmdenv-log-level = off

# Keep only our smart bin application logs visible in Cmdenv
**.loRaNodes[*].app[0].cmdenv-log-level = info

# Remove event banners in command-line mode
cmdenv-event-banners = false

# -------------------------------------------------
# FLoRa / LoRa general settings
# -------------------------------------------------
**.maxTransmissionDuration = 4s
**.energyDetection = -110dBm
**.alohaChannelModel = false

**.numberOfNodes = 5
**.numberOfGateways = 1

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxX = 1000m
**.constraintAreaMaxY = 1000m
**.constraintAreaMaxZ = 0m

**.sigma = 3.57
**.minInterferenceTime = 0s
**.displayAddresses = false

# -------------------------------------------------
# Disable energy module requirement for this prototype
# -------------------------------------------------
**.loRaNodes[*].LoRaNic.energySourceModule = ""
**.loRaNodes[*].LoRaNic.radio.energySourceModule = ""

# -------------------------------------------------
# LoRa medium settings
# -------------------------------------------------
**.radio.radioMediumModule = "LoRaMedium"
**.LoRaMedium.pathLossType = "LoRaLogNormalShadowing"
**.LoRaMedium.mediumLimitCacheType = "LoRaMediumCache"
**.LoRaMedium.rangeFilter = "communicationRange"
**.LoRaMedium.neighborCacheType = "LoRaNeighborCache"
**.LoRaMedium.neighborCache.range = 546m
**.LoRaMedium.neighborCache.refillPeriod = 3000s

WasteBinNetwork.**.radio.separateTransmissionParts = false
WasteBinNetwork.**.radio.separateReceptionParts = false

# -------------------------------------------------
# Gateway and network server settings
# -------------------------------------------------
**.loRaGW[*].numUdpApps = 1
**.loRaGW[0].packetForwarder.localPort = 2000
**.loRaGW[0].packetForwarder.destPort = 1000
**.loRaGW[0].packetForwarder.destAddresses = "networkServer"
**.loRaGW[0].packetForwarder.indexNumber = 0

**.networkServer.numApps = 1
**.networkServer.app[0].typename = "NetworkServerApp"
**.networkServer.app[0].destAddresses = "loRaGW[0]"
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].adrMethod = "avg"
**.networkServer.**.evaluateADRinServer = true

**.ipv4Delayer.config = xmldoc("../../flora/simulations/cloudDelays.xml")

# -------------------------------------------------
# Smart bin LoRa application settings
# -------------------------------------------------
**.loRaNodes[*].numApps = 1
**.loRaNodes[*].app[0].typename = "wastebinsim.SmartBinLoRaApp"

# LoRa physical parameters
**.loRaNodes[*].app[0].initialLoRaSF = 12
**.loRaNodes[*].app[0].initialLoRaTP = 14dBm
**.loRaNodes[*].app[0].initialLoRaBW = 125kHz
**.loRaNodes[*].app[0].initialLoRaCR = 4
**.loRaNodes[*].app[0].initialLoRaCF = 868MHz
**.loRaNodes[*].app[0].initialUseHeader = true
**.loRaNodes[*].app[0].evaluateADRinNode = true
**.loRaNodes[*].app[0].dataSize = 20B
**.loRaNodes[*].app[0].numberOfPacketsToSend = 0
**.loRaNodes[*].app[0].expectedOverflowAlerts = 5
**.loRaNodes[*].app[0].autoStopDelay = 10s
**.loRaNodes[*].app[0].minSendGap = 8s
# Node positions - moved up and started from left side
**.loRaNodes[0].**.initialX = 80m
**.loRaNodes[0].**.initialY = 360m

**.loRaNodes[1].**.initialX = 220m
**.loRaNodes[1].**.initialY = 360m

**.loRaNodes[2].**.initialX = 360m
**.loRaNodes[2].**.initialY = 360m

**.loRaNodes[3].**.initialX = 500m
**.loRaNodes[3].**.initialY = 360m

**.loRaNodes[4].**.initialX = 640m
**.loRaNodes[4].**.initialY = 360m

**.loRaNodes[*].**.initFromDisplayString = false
**.loRaNodes[*].**.evaluateADRinNode = true

# Gateway position - centered above bins
**.loRaGW[0].**.initialX = 360m
**.loRaGW[0].**.initialY = 230m
**.loRaGW[*].**.initFromDisplayString = false
**.LoRaGWNic.radio.iAmGateway = true
# -------------------------------------------------
# Waste bin behaviour: 2 residential, 2 commercial, 1 mixed
# -------------------------------------------------

# Residential bin 0
**.loRaNodes[0].app[0].binId = 0
**.loRaNodes[0].app[0].zoneType = "residential"
**.loRaNodes[0].app[0].initialFill = 10
**.loRaNodes[0].app[0].maxCapacity = 100
**.loRaNodes[0].app[0].warningThreshold = 70
**.loRaNodes[0].app[0].criticalThreshold = 90
**.loRaNodes[0].app[0].meanGrowth = 1.5
**.loRaNodes[0].app[0].growthInterval = 10min
**.loRaNodes[0].app[0].reportInterval = 30min

# Residential bin 1
**.loRaNodes[1].app[0].binId = 1
**.loRaNodes[1].app[0].zoneType = "residential"
**.loRaNodes[1].app[0].initialFill = 20
**.loRaNodes[1].app[0].maxCapacity = 100
**.loRaNodes[1].app[0].warningThreshold = 70
**.loRaNodes[1].app[0].criticalThreshold = 90
**.loRaNodes[1].app[0].meanGrowth = 2.0
**.loRaNodes[1].app[0].growthInterval = 12min
**.loRaNodes[1].app[0].reportInterval = 30min

# Commercial bin 2
**.loRaNodes[2].app[0].binId = 2
**.loRaNodes[2].app[0].zoneType = "commercial"
**.loRaNodes[2].app[0].initialFill = 15
**.loRaNodes[2].app[0].maxCapacity = 100
**.loRaNodes[2].app[0].warningThreshold = 70
**.loRaNodes[2].app[0].criticalThreshold = 90
**.loRaNodes[2].app[0].meanGrowth = 4.0
**.loRaNodes[2].app[0].growthInterval = 6min
**.loRaNodes[2].app[0].reportInterval = 20min

# Commercial bin 3
**.loRaNodes[3].app[0].binId = 3
**.loRaNodes[3].app[0].zoneType = "commercial"
**.loRaNodes[3].app[0].initialFill = 25
**.loRaNodes[3].app[0].maxCapacity = 100
**.loRaNodes[3].app[0].warningThreshold = 70
**.loRaNodes[3].app[0].criticalThreshold = 90
**.loRaNodes[3].app[0].meanGrowth = 5.0
**.loRaNodes[3].app[0].growthInterval = 5min
**.loRaNodes[3].app[0].reportInterval = 15min

# Mixed bin 4
**.loRaNodes[4].app[0].binId = 4
**.loRaNodes[4].app[0].zoneType = "mixed"
**.loRaNodes[4].app[0].initialFill = 18
**.loRaNodes[4].app[0].maxCapacity = 100
**.loRaNodes[4].app[0].warningThreshold = 70
**.loRaNodes[4].app[0].criticalThreshold = 90
**.loRaNodes[4].app[0].meanGrowth = 3.0
**.loRaNodes[4].app[0].growthInterval = 8min
**.loRaNodes[4].app[0].reportInterval = 25min